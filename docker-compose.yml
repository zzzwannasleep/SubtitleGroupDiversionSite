services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ptapp
      POSTGRES_USER: ptuser
      POSTGRES_PASSWORD: ptpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ptuser -d ptapp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    volumes:
      - ./data/postgres/pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  tracker-db:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: xbt
      MARIADB_USER: tracker
      MARIADB_PASSWORD: tracker-pass
      MARIADB_ROOT_PASSWORD: rootpass
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u root -prootpass --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    volumes:
      - ./data/tracker-db:/var/lib/mysql
      - ./docker/xbt-tracker/initdb:/docker-entrypoint-initdb.d:ro

  backend:
    image: ${BACKEND_IMAGE:-subtitlegroupdiversionsite-backend:local}
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      tracker-db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./data/torrents:/app/data/torrents
      - ./data/uploads:/app/data/uploads

  frontend:
    image: ${FRONTEND_IMAGE:-subtitlegroupdiversionsite-frontend:local}
    build:
      context: ./frontend
    depends_on:
      - backend
    restart: unless-stopped

  tracker:
    image: ${TRACKER_IMAGE:-subtitlegroupdiversionsite-xbt-tracker:local}
    build:
      context: ./docker/xbt-tracker
    environment:
      XBT_MYSQL_HOST: tracker-db
      XBT_MYSQL_PORT: 3306
      XBT_MYSQL_DATABASE: xbt
      XBT_MYSQL_USER: tracker
      XBT_MYSQL_PASSWORD: tracker-pass
      XBT_LISTEN_HTTP_PORT: 2710
      XBT_LISTEN_UDP_PORT: 6881
      XBT_AUTO_REGISTER: 0
      XBT_ANONYMOUS_ANNOUNCE: 0
      XBT_ANONYMOUS_SCRAPE: 0
      XBT_FULL_SCRAPE: 0
    depends_on:
      tracker-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2710"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "2710:2710"
      - "6881:6881/udp"
    restart: unless-stopped

  nginx:
    image: nginx:stable-alpine
    depends_on:
      - frontend
      - backend
      - tracker
    ports:
      - "${WEB_HOST:-0.0.0.0}:${WEB_PORT:-80}:80"
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
