services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ptapp
      POSTGRES_USER: ptuser
      POSTGRES_PASSWORD: ptpass
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ptuser -d ptapp"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./data/torrents:/app/data/torrents
      - ./data/uploads:/app/data/uploads

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    restart: unless-stopped

  tracker:
    image: alpine:3.20
    command: ["tail", "-f", "/dev/null"]
    restart: unless-stopped
    # Replace this placeholder with one concrete implementation after the tracker PoC:
    # - XBT Tracker: custom image + dedicated tracker-db service
    # - Torrust Tracker: official container + matching announce/scrape config

  nginx:
    image: nginx:stable-alpine
    depends_on:
      - frontend
      - backend
      - tracker
    ports:
      - "80:80"
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
