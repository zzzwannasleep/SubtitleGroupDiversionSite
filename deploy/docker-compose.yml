name: subtitle-group-diversion-site

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  frontend:
    image: ghcr.io/zzzwannasleep/subtitlegroupdiversionsite/frontend:latest
    pull_policy: always
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - app_net
    logging: *default-logging

  backend:
    image: ghcr.io/zzzwannasleep/subtitlegroupdiversionsite/backend:latest
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS},127.0.0.1,localhost
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      REDIS_URL: redis://redis:6379/0
      XBT_SYNC_ENABLED: "true"
      XBT_SYNC_DATABASE_ALIAS: default
    expose:
      - "8000"
    volumes:
      - torrent_storage:/app/media
      - backend_static:/app/staticfiles
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app_net
    logging: *default-logging

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    env_file:
      - ./.env
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_net
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - app_net
    logging: *default-logging

  xbt:
    image: ghcr.io/zzzwannasleep/subtitlegroupdiversionsite/xbt:latest
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      XBT_DEBUG: ${XBT_DEBUG:-0}
      XBT_LOG_ACCESS: ${XBT_LOG_ACCESS:-0}
      XBT_LOG_ANNOUNCE: ${XBT_LOG_ANNOUNCE:-0}
      XBT_LOG_SCRAPE: ${XBT_LOG_SCRAPE:-0}
    ports:
      - "${XBT_TRACKER_PORT:-2710}:${XBT_TRACKER_PORT:-2710}"
    networks:
      - app_net
    logging: *default-logging

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/var/www/static:ro
      - torrent_storage:/var/www/media:ro
    networks:
      - app_net
    logging: *default-logging

networks:
  app_net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  torrent_storage:
  backend_static:
