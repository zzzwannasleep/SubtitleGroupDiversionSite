name: subtitle-group-diversion-site

services:
  frontend:
    image: ghcr.io/zzzwannasleep/subtitlegroupdiversionsite/frontend:${APP_IMAGE_TAG:-main-f1de957}
    pull_policy: always
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - app_net

  backend:
    image: ghcr.io/zzzwannasleep/subtitlegroupdiversionsite/backend:${APP_IMAGE_TAG:-main-f1de957}
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      REDIS_URL: redis://redis:6379/0
      XBT_SYNC_ENABLED: "true"
      XBT_SYNC_DATABASE_ALIAS: default
    expose:
      - "8000"
    volumes:
      - torrent_storage:/app/media
      - backend_static:/app/staticfiles
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - app_net

  mysql:
    image: mysql:8
    restart: unless-stopped
    env_file:
      - ./.env
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - app_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 20s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  xbt:
    image: ghcr.io/zzzwannasleep/subtitlegroupdiversionsite/xbt:${APP_IMAGE_TAG:-main-f1de957}
    pull_policy: always
    restart: unless-stopped
    env_file:
      - ./.env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
    ports:
      - "${XBT_TRACKER_PORT:-2710}:${XBT_TRACKER_PORT:-2710}"
    networks:
      - app_net

  nginx:
    image: nginx:stable-alpine
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_static:/var/www/static:ro
      - torrent_storage:/var/www/media:ro
      - nginx_logs:/var/log/nginx
    networks:
      - app_net

networks:
  app_net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  torrent_storage:
  backend_static:
  nginx_logs:
